{% load static %}
<link rel="stylesheet" href="{% static 'css/ai-chat.css' %}">

<button id="ai-chat-trigger" class="ai-chat-trigger" title="AI 助手">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
</button>

<div id="ai-chat-window" class="ai-chat-window">
    <div class="ai-chat-header">
        <h3>AI 资产助手</h3>
        <div class="ai-chat-header-actions">
            <button class="ai-chat-toggle-sessions" title="历史会话">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            </button>
            <button class="ai-chat-new" title="新对话">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button class="ai-chat-close" title="关闭">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
    </div>
    <div class="ai-chat-body">
        <div class="ai-chat-sessions">
            <div class="ai-chat-sessions-header">历史会话</div>
            <div class="ai-chat-session-list"></div>
        </div>
        <div class="ai-chat-messages">
            <div class="ai-welcome">
                <strong>AI 资产助手</strong>
                你好！我是企业资产管理系统的 AI 助手。<br>
                你可以问我关于资产、领用、维修等方面的问题。
            </div>
        </div>
    </div>
    <div class="ai-chat-input-area">
        <div class="ai-chat-input-wrap">
            <textarea class="ai-chat-input" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"></textarea>
            <button class="ai-chat-send" title="发送">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<script src="{% static 'js/ai-chat.js' %}"></script>
