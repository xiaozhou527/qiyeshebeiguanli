<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 企业资产管理系统</title>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="brand brand-center">
            <div class="brand-badge">AMS</div>
            <div>
                <h1>企业资产管理系统</h1>
                <p>普通版登录入口</p>
            </div>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-grid single-column">
                <div>
                    <label for="id_username">用户名</label>
                    <input class="form-control" id="id_username" name="username" type="text" required>
                </div>
                <div>
                    <label for="id_password">密码</label>
                    <input class="form-control" id="id_password" name="password" type="password" required>
                </div>
            </div>
            {% if form.errors %}
            <div class="message error">用户名或密码错误，请重新输入。</div>
            {% endif %}
            <button type="submit" class="btn btn-primary btn-block">登录系统</button>
        </form>
        <div class="helper-text">
            默认演示账号可通过 `python manage.py seed_demo` 初始化。普通员工和资产管理员账号需要由上级账号在系统内注册。
        </div>
    </div>
</body>
</html>
